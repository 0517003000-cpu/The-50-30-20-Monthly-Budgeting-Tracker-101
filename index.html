<!DOCTYPE html>
<html>

<head>
<title>Monthly Budget Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Monthly Budget Tracker</h1>

<div class="topBar">

Name:
<input id="name" class="small">

Monthly Income:
<input id="income" class="small">

Month:
<select id="monthSelect"></select>

<button onclick="newMonth()">New Month</button>

<a href="https://0517003000-cpu.github.io/Monthly-Budget-Calc/" target="_blank">
Monthly Budget Calculator
</a>

</div>


<div class="tables">

<!-- ESSENTIAL -->

<table>

<tr>
<th colspan="2">Essential Expenses</th>
</tr>

<tr>
<td>Available Income</td>
<td><input id="essentialBudget"></td>
</tr>

<tr>
<td>Expense</td>
<td>Cost</td>
</tr>

<tr><td contenteditable="true"></td><td><input class="essential"></td></tr>
<tr><td contenteditable="true"></td><td><input class="essential"></td></tr>
<tr><td contenteditable="true"></td><td><input class="essential"></td></tr>
<tr><td contenteditable="true"></td><td><input class="essential"></td></tr>
<tr><td contenteditable="true"></td><td><input class="essential"></td></tr>

<tr>
<td>Total</td>
<td id="essentialTotal">0</td>
</tr>

<tr>
<td>Status</td>
<td id="essentialStatus">-</td>
</tr>

</table>


<!-- NON ESSENTIAL -->

<table>

<tr>
<th colspan="2">Non Essential Expenses</th>
</tr>

<tr>
<td>Available Income</td>
<td><input id="nonBudget"></td>
</tr>

<tr>
<td>Expense</td>
<td>Cost</td>
</tr>

<tr><td contenteditable="true"></td><td><input class="non"></td></tr>
<tr><td contenteditable="true"></td><td><input class="non"></td></tr>
<tr><td contenteditable="true"></td><td><input class="non"></td></tr>
<tr><td contenteditable="true"></td><td><input class="non"></td></tr>
<tr><td contenteditable="true"></td><td><input class="non"></td></tr>

<tr>
<td>Total</td>
<td id="nonTotal">0</td>
</tr>

<tr>
<td>Status</td>
<td id="nonStatus">-</td>
</tr>

</table>


<!-- SAVINGS -->

<table>

<tr>
<th colspan="2">Savings</th>
</tr>

<tr>
<td>Available Income</td>
<td><input id="saveBudget"></td>
</tr>

<tr>
<td>Saving Type</td>
<td>Amount</td>
</tr>

<tr><td contenteditable="true"></td><td><input class="save"></td></tr>
<tr><td contenteditable="true"></td><td><input class="save"></td></tr>
<tr><td contenteditable="true"></td><td><input class="save"></td></tr>
<tr><td contenteditable="true"></td><td><input class="save"></td></tr>
<tr><td contenteditable="true"></td><td><input class="save"></td></tr>

<tr>
<td>Total</td>
<td id="saveTotal">0</td>
</tr>

<tr>
<td>Status</td>
<td id="saveStatus">-</td>
</tr>

</table>

</div>


<div class="adviceBox">

<h2>Budget Advice</h2>

<div id="advice"></div>

</div>

<script src="script.js"></script>

</body>
</html>
